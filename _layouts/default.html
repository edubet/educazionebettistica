<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Educazione Bettistica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

        *{margin:0;padding:0;box-sizing:border-box;}

        body{
          background:#0a0a0a;
          font-family:'Barlow',sans-serif;
          color:#fff;
          min-height:100vh;
        }

        /* GRID NOISE */
        body::before{
          content:'';
          position:fixed;
          inset:0;
          background-image:
            linear-gradient(rgba(0,255,120,0.025) 1px,transparent 1px),
            linear-gradient(90deg,rgba(0,255,120,0.025) 1px,transparent 1px);
          background-size:40px 40px;
          z-index:0;
          pointer-events:none;
        }

        /* TOP SHIMMER BAR */
        .top-bar{
          height:4px;
          background:linear-gradient(90deg,#00ff78,#00c8ff,#00ff78);
          background-size:200% 100%;
          animation:shimmer 3s linear infinite;
          position:relative;z-index:10;
        }
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

        /* NAVBAR */
        nav{
          position:sticky;top:0;z-index:100;
          background:rgba(10,10,10,0.96);
          border-bottom:1px solid rgba(0,255,120,0.12);
          padding:0 40px;
          height:60px;
          display:flex;align-items:center;justify-content:space-between;
          backdrop-filter:blur(10px);
        }

        .logo{
          font-family:'Bebas Neue',sans-serif;
          font-size:26px;letter-spacing:3px;
          background:linear-gradient(135deg,#00ff78,#00c8ff);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }

        .nav-links{list-style:none;display:flex;gap:0;}
        .nav-links li a{
          font-family:'Barlow Condensed',sans-serif;
          font-weight:700;font-size:12px;letter-spacing:2.5px;
          text-transform:uppercase;color:rgba(255,255,255,0.35);
          text-decoration:none;padding:8px 14px;
          border-bottom:2px solid transparent;
          transition:all .15s;
        }
        .nav-links li a:hover,.nav-links li a.active{color:#00ff78;border-bottom-color:#00ff78;}

        /* Incolla qui tutto il resto del CSS che hai mandato prima... */
        /* Per brevità non lo incollo tutto qui, ma tu mettilo tutto fino alla chiusura di footer */

    </style>
</head>
<body>

<div class="top-bar"></div>

<nav>
  <div class="logo">Educazione Bettistica</div>
  <ul class="nav-links">
    <li><a href="/" class="active">Home</a></li>
    <li><a href="/articoli">Articoli</a></li>
    <li><a href="/chi-sono">Chi Sono</a></li>
    <li><a href="/contatti">Contatti</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <div class="footer-logo">Educazione Bettistica</div>
  <div class="footer-copy">© 2025 · All rights reserved · github.io</div>
</footer>

</body>
</html>
